<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tec Academy</title>
</head>
<body>
    <h1>Sistema de Cadastro de Alunos</h1>
    <div>
        <h2>Cadastro</h2>
        <form>
            <label>Nome</label> <br>
            <input type="text"> <br>
            <label>Email</label> <br>
            <input type="email"> <br>
            <label>Idade</label> <br>
            <input type="number"> <br>
            <select>
                <option>HTML</option>
                <option>CSS</option>
                <option>JavaScript</option>
            </select> <br>
            <label>Obeservações</label> <br>
            <textarea></textarea> <br>
            <input type="submit" value="Cadastrar">
        </form>
    </div>
    <hr>
    <div>
        <h2>Alunos Matriculados</h2>
        <table>
            <caption>Lista de Alunos</caption>
            <tr>
                <th>Nome</th>
                <th>Email</th>
                <th>Curso</th>
            </tr>
            <tr>
                <td>Ana</td>
                <td>ana@email.com</td>
                <td>HTML</td>
            </tr>
            <tr>
                <td>Bruno</td>
                <td>bruno@email.com</td>
                <td>CSS</td>
            </tr>
            <tr>
                <td>Carla</td>
                <td>carla@email.com</td>
                <td>JavaScript</td>
            </tr>
        </table>
    </div>
</body>
</html>
